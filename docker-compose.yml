services:
  zookeeper:
    image: zookeeper:3.9.4
    restart: always
    ports:
      - "2181:2181"

  postgres:
    image: postgres:17.5-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: service_2
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data


  kafka-1:
    container_name: kafka-1
    image: confluentinc/cp-kafka:7.8.0
    ports:
      - "9095:9095"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,OUTSIDE://0.0.0.0:9095
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-1:9092,OUTSIDE://localhost:9095
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,OUTSIDE:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: [ "CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list" ]
      interval: 5s
      timeout: 10s
      retries: 10

  kafka-init:
    image: confluentinc/cp-kafka:7.8.0
    depends_on:
      kafka-1:
        condition: service_healthy
    entrypoint: [ "/bin/sh", "-c" ]
    command: |
      "kafka-topics --bootstrap-server kafka-1:9092 --create --if-not-exists --topic user_waved --partitions 2 --replication-factor 1
      kafka-topics --bootstrap-server kafka-1:9092 --create --if-not-exists --topic user_waved_dlq --partitions 1 --replication-factor 1"

volumes:
  kafka_data:
  postgres_data: